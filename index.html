<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ocaoca</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#ffffff;cursor:grab}
body.drag{cursor:grabbing}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;image-rendering:auto}
.loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#ffffff;z-index:10;transition:opacity .4s}
.loader.hidden{opacity:0;pointer-events:none}
.lbar{width:160px;height:2px;background:rgba(0,0,0,0.08);border-radius:1px;overflow:hidden}
.lfill{height:100%;background:rgba(0,0,0,0.25);width:0%;transition:width .15s;border-radius:1px}
.ltxt{font-size:11px;color:rgba(0,0,0,0.35);font-family:system-ui,sans-serif;letter-spacing:0.06em}
.lerr{font-size:12px;color:#c00;font-family:system-ui,sans-serif;text-align:center;padding:0 24px;line-height:1.7;white-space:pre-line;display:none}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.9);font-size:12px;font-family:system-ui,sans-serif;padding:7px 18px;border-radius:20px;pointer-events:none;transition:opacity .6s;letter-spacing:0.04em;white-space:nowrap}
.hint.fade{opacity:0}
body.zoom-mode{cursor:none}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="loader" id="loader">
  <div class="lbar"><div class="lfill" id="lfill"></div></div>
  <div class="ltxt" id="ltxt">Загрузка...</div>
  <div class="lerr" id="lerr"></div>
</div>
<div class="hint fade" id="hint">Перетащите для вращения · двойной клик = зум</div>
<script>
const CFG={framesPath:'frames',totalFrames:360,framePrefix:'1_',frameExt:'png',frameDigits:4,transparent:false,bgColor:'#ffffff',sx:1.0,ease:.18,inertia:.92};
const cv=document.getElementById('cv'),loader=document.getElementById('loader'),lfill=document.getElementById('lfill'),ltxt=document.getElementById('ltxt'),hint=document.getElementById('hint');
const imgs=[];let loaded=0,shown=false,fF=0,tF=0,vX=0,drag=false,px=0,zoomMode=false,mx=0,my=0;
function dpr(){return window.devicePixelRatio||1}
function resize(){
  const d=dpr(),w=window.innerWidth,h=window.innerHeight;
  cv.width=Math.round(w*d);cv.height=Math.round(h*d);
  cv.style.width=w+'px';cv.style.height=h+'px';
  draw();
}
function draw(){
  if(!shown)return;
  const n=CFG.totalFrames,f=((Math.round(fF)%n)+n)%n,img=getImg(f);
  const ctx=cv.getContext('2d',{alpha:CFG.transparent}),w=cv.width,h=cv.height;
  ctx.clearRect(0,0,w,h);
  if(!CFG.transparent){ctx.fillStyle=CFG.bgColor;ctx.fillRect(0,0,w,h);}
  if(!img)return;
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  const pad=0.04,maxW=w*(1-pad*2),maxH=h*(1-pad*2),r=Math.min(maxW/img.naturalWidth,maxH/img.naturalHeight),dw=img.naturalWidth*r,dh=img.naturalHeight*r;
  const ox=(w-dw)/2,oy=(h-dh)/2;
  ctx.drawImage(img,ox,oy,dw,dh);

  if(zoomMode&&img){
    const scale=2.5;
    const cx=Math.round(mx*w), cy=Math.round(my*h);
    // Map cursor to image pixel
    const imgCX=(cx-ox)/r;
    const imgCY=(cy-oy)/r;
    // Source rect = image area divided by scale
    const sw=img.naturalWidth/scale;
    const sh=img.naturalHeight/scale;
    const sx=Math.max(0,Math.min(img.naturalWidth-sw,imgCX-sw/2));
    const sy=Math.max(0,Math.min(img.naturalHeight-sh,imgCY-sh/2));
    // Draw zoomed portion into the same display area (ox,oy,dw,dh) — no stretching
    ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
    ctx.drawImage(img,sx,sy,sw,sh,ox,oy,dw,dh);
  }
}
function getImg(i){const n=CFG.totalFrames;for(let d=0;d<n;d++){const a=imgs[(i+d)%n];if(a&&a.complete&&a.naturalWidth)return a;const b=imgs[(i-d+n)%n];if(b&&b.complete&&b.naturalWidth)return b}return null}
function loop(){requestAnimationFrame(loop);if(!shown)return;fF+=(tF-fF)*Math.min(CFG.ease*3,1);if(!drag&&Math.abs(vX)>0.05){tF+=vX;vX*=CFG.inertia}draw()}
function pad0(n){return String(n+1).padStart(CFG.frameDigits,'0')}
function loadAll(){let errs=0;for(let i=0;i<CFG.totalFrames;i++){const img=new Image();img.onload=()=>{imgs[i]=img;loaded++;lfill.style.width=Math.round(loaded/CFG.totalFrames*100)+'%';ltxt.textContent='Загрузка '+loaded+' / '+CFG.totalFrames;if(!shown&&img.complete&&img.naturalWidth){shown=true;loader.classList.add('hidden');hint.classList.remove('fade');setTimeout(()=>hint.classList.add('fade'),3000)}};img.onerror=()=>{loaded++;errs++;if(loaded===CFG.totalFrames&&errs===CFG.totalFrames){loader.classList.remove('hidden');document.getElementById('lerr').style.display='block';document.getElementById('lerr').textContent='Кадры не найдены\n\nОжидается:\n'+CFG.framesPath+'/'+CFG.framePrefix+pad0(0)+'.'+CFG.frameExt;ltxt.style.display='none';lfill.parentElement.style.display='none'}};imgs.push(null);img.src=CFG.framesPath+'/'+CFG.framePrefix+pad0(i)+'.'+CFG.frameExt}}
function toggleZoom(){zoomMode=!zoomMode;document.body.classList.toggle('zoom-mode',zoomMode)}
document.addEventListener('dblclick',()=>toggleZoom());
document.addEventListener('mousedown',e=>{if(zoomMode)return;drag=true;px=e.clientX;vX=0;document.body.classList.add('drag')});
window.addEventListener('mouseup',()=>{drag=false;document.body.classList.remove('drag')});
window.addEventListener('mousemove',e=>{
  const d=dpr();
  mx=e.clientX*d/cv.width;my=e.clientY*d/cv.height;
  if(!drag)return;const dx=e.clientX-px;px=e.clientX;tF-=dx*CFG.sx;vX=-dx*CFG.sx*0.25;
});
document.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;px=e.touches[0].clientX;vX=0}},{passive:true});
window.addEventListener('touchend',()=>drag=false);
window.addEventListener('touchmove',e=>{if(!drag||!e.touches.length)return;const dx=e.touches[0].clientX-px;px=e.touches[0].clientX;tF-=dx*CFG.sx;vX=-dx*CFG.sx*0.25},{passive:true});
window.addEventListener('wheel',e=>{e.preventDefault();tF+=e.deltaY*0.06},{passive:false});
window.addEventListener('resize',resize);
resize();loop();loadAll();
</script>
</body>
</html>
